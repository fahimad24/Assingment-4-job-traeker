<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracker | Find Your Dream Job</title>
    <!-- Tailwindcss  + daisyUi-->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

      body {
        font-family: "Inter", sans-serif;
      }

      #job-facilities li {
        list-style: disc;
      }
    </style>
  </head>
  <body class="bg-[#F8FAFC]">
    <!-- dashboard -->
    <section class="max-w-6xl mx-auto pt-30">
      <div>
        <h1 class="text-5xl font-bold">Job Application Tracker</h1>
        <div class="grid grid-cols-3 gap-4 mt-8">
          <div class="bg-white border-2 border-gray-100 p-5 rounded space-y-4">
            <p class="text-lg font-semibold">Total</p>
            <p id="total-count-dash" class="text-slate-900 font-bold">0</p>
          </div>
          <div class="bg-white border-2 border-gray-100 p-5 rounded space-y-4">
            <p class="text-lg font-semibold">Interview</p>
            <p id="interview-count" class="text-green-600 font-bold">0</p>
          </div>
          <div class="bg-white border-2 border-gray-100 p-5 rounded space-y-4">
            <p class="text-lg font-semibold">Rejected</p>
            <p id="rejected-count" class="text-red-600 font-bold">0</p>
          </div>
        </div>
      </div>
      <hr class="my-10 border-t-2 border-gray-200" />
    </section>

    <!-- Job listed -->
    <section class="max-w-6xl mx-auto">
      <div class="py-8">
        <div class="flex items-center justify-between">
          <h1 class="text-3xl font-bold">Available Jobs</h1>
          <p><span id="job-count">0</span> Jobs</p>
        </div>
        <div class="flex items-center gap-4 mt-8">
          <button
            id="all-jobs-list"
            class="w-30 h-10 rounded text-white cursor-pointer btn btn-info border border-gray-400"
          >
            All
          </button>
          <button
            class="w-30 h-10 rounded cursor-pointer btn bg-white border text-gray-400 border-gray-400"
          >
            Interview
          </button>
          <button
            class="w-30 h-10 rounded cursor-pointer btn bg-white border text-gray-400 border-gray-400"
          >
            Rejected
          </button>
        </div>

        <div id="job-list-container" class="mt-8 space-y-8">
          <!-- Job cards will be dynamically inserted here -->
          <div id="no-job-availabel" class="hidden">
            <div
              class="bg-white border-2 border-gray-100 p-8 py-20 rounded-lg space-y-8 flex flex-col items-center justify-center h-84"
            >
              <div>
                <img src="./assets/jobs.png" alt="Document" class="w-20" />
              </div>
              <div class="mt-1 text-center space-y-2">
                <h2 class="text-3xl font-semibold">No Job Available</h2>
                <p class="text-gray-500">
                  Check back soon for new job opportunities
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <script src="./scripts/jobList.js"></script>
    <script src="./scripts/utils/getElement.js"></script>
    <script src="./scripts/index.js"></script>
  </body>
</html>
