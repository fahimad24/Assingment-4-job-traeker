<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracker | Find Your Dream Job</title>
    <!-- css -->
    <link rel="stylesheet" href="app.css" />

    <!-- font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Tailwindcss  + daisyUi-->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

      body {
        font-family: "Inter", sans-serif;
      }

      #job-facilities li {
        list-style: disc;
      }
    </style>
  </head>
  <body class="bg-[#F8FAFC]">
    <!-- dashboard -->
    <section class="max-w-6xl mx-auto pt-30 max-sm:px-5">
      <div>
        <h1 class="md:text-5xl text-2xl font-bold">Job Application Tracker</h1>
        <div class="grid md:grid-cols-3 grid-cols-1 gap-4 mt-8">
          <div class="bg-white border-3 border-gray-600 p-5 rounded space-y-4">
            <p class="text-lg font-semibold">Total</p>
            <p id="total-count-dash" class="text-slate-900 font-bold">0</p>
          </div>
          <div class="bg-white border-3 border-green-500 p-5 rounded space-y-4">
            <p class="text-lg font-semibold">Interview</p>
            <p id="interview-count" class="text-green-600 font-bold">0</p>
          </div>
          <div class="bg-white border-3 border-red-500 p-5 rounded space-y-4">
            <p class="text-lg font-semibold">Rejected</p>
            <p id="rejected-count" class="text-red-600 font-bold">0</p>
          </div>
        </div>
      </div>
      <hr class="my-10 border-t-2 border-gray-200" />
    </section>

    <!-- Job listed -->
    <section class="max-w-6xl mx-auto">
      <div class="py-8 max-sm:px-5">
        <div class="flex items-center justify-between">
          <h1 class="text-3xl font-bold">Available Jobs</h1>
          <p><span id="job-count">0</span> Jobs</p>
        </div>
        <div class="flex items-center gap-4 mt-8">
          <button
            id="all-jobs-list"
            class="w-30 h-10 rounded text-white cursor-pointer btn btn-info border border-gray-400"
          >
            All
          </button>
          <button
            id="interview-job-list"
            class="w-30 h-10 rounded cursor-pointer btn bg-white border text-gray-400 border-gray-400"
          >
            Interview
          </button>
          <button
            id="rejected-job-list"
            class="w-30 h-10 rounded cursor-pointer btn bg-white border text-gray-400 border-gray-400"
          >
            Rejected
          </button>
        </div>

        <div id="job-list-container" class="mt-8 space-y-8">
          <!-- Job cards will be dynamically inserted here -->
        </div>
        <div id="interview-container" class="hidden mt-8 space-y-8"></div>
        <div id="rejected-container" class="hidden mt-8 space-y-8"></div>
      </div>
    </section>
    <script src="./scripts/jobList.js"></script>
    <script src="./scripts/loaded.js"></script>
    <script src="./scripts/utils/getElement.js"></script>
    <script src="./scripts/index.js"></script>
  </body>
</html>
